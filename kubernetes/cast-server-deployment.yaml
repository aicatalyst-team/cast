apiVersion: apps/v1
kind: Deployment
metadata:
  name: cast-server
  namespace: poc-cast
  labels:
    app: cast-server
    autopoc.io/project: cast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cast-server
  template:
    metadata:
      labels:
        app: cast-server
    spec:
      containers:
        - name: cast-server
          image: image-registry.openshift-image-registry.svc:5000/poc-cast/cast-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: NODE_ENV
              value: "production"
            - name: CAST_PORT
              value: "8080"
            - name: PORT
              value: "8081"
            - name: CAST_AGENTS_DIR
              value: "/opt/app-root/data/agents"
            - name: CAST_CONFIG_DIR
              value: "/opt/app-root/data/config"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Server binds to 127.0.0.1 — use exec probe
          readinessProbe:
            exec:
              command: ["node", "-e", "const h=require('http');h.get('http://127.0.0.1:8080/api/agents',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["node", "-e", "const h=require('http');h.get('http://127.0.0.1:8080/api/agents',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
            initialDelaySeconds: 30
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
