apiVersion: apps/v1
kind: Deployment
metadata:
  name: cast-server
  namespace: poc-cast
  labels:
    app: cast-server
    autopoc.io/project: cast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cast-server
  template:
    metadata:
      labels:
        app: cast-server
    spec:
      containers:
        - name: cast-server
          image: image-registry.openshift-image-registry.svc:5000/poc-cast/cast-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: NODE_ENV
              value: "production"
            - name: CAST_PORT
              value: "8080"
            - name: PORT
              value: "8081"
            - name: CAST_AGENTS_DIR
              value: "/opt/app-root/data/agents"
            - name: CAST_CONFIG_DIR
              value: "/opt/app-root/data/config"
            - name: CAST_BIND_ALL
              value: "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Note: server binds 0.0.0.0 via CAST_BIND_ALL=1
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
